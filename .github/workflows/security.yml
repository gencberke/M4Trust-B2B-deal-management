name: Security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: code/requirements-ci.txt
      - name: Install application and audit tools
        run: |
          python -m pip install -r requirements-ci.txt
          python -m pip install pip-audit bandit
      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements-ci.txt
      - name: Scan Python for high-severity findings
        run: python -m bandit -r backend/app scripts -x tests -lll
      - name: Direct application startup smoke
        env:
          APP_ENCRYPTION_KEY: eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHg=
          APP_HMAC_KEY: eXl5eXl5eXl5eXl5eXl5eXl5eXl5eXl5eXl5eXl5eXk=
          DB_PATH: ${{ runner.temp }}/m4trust-startup.sqlite
          DOCUMENT_STORAGE_DIR: ${{ runner.temp }}/m4trust-documents
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from backend.app.main import create_app

          with TestClient(create_app()) as client:
              response = client.get("/health")
              assert response.status_code == 200
              assert response.json() == {"status": "ok"}
          PY

  frontend-dependencies:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: code/frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
